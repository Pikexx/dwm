# --- ANIMATIONS ---
animations = true;
animation-stiffness-in-tag = 90;
animation-window-mass = 0.4;
animation-dampening = 15;
animation-clamping = true;
animation-for-open-window = "minimize";
animation-for-unmap-window = "zoom";
animation-for-transient-window = "squeeze";
# Tag switching: "none" blocks slide; dwm handles the fade itself in view().
# Open/close/transient animations above are unaffected by these two settings.
animation-for-prev-tag = "none";
animation-for-next-tag = "none";
enable-fading-prev-tag = false;
enable-fading-next-tag = false;

# --- SHADOWS ---
shadow = true;
shadow-radius = 23;
shadow-opacity = 1;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-exclude = [
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "class_g *?= 'slop'",
  "_GTK_FRAME_EXTENTS@:c"
];

# --- FADING ---
fading = true;
fade-in-step = 0.023;
fade-out-step = 0.035;
fade-delta = 10;

# --- OPACITY & FOCUS ---
inactive-opacity = 0.8;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = true;
inactive-dim = 0.0;
active-dim = 0.0;
focus-exclude = [
  "class_g = 'Cairo-clock'",
  "class_g = 'dwm'",
  "class_g = 'Polybar'",
  "class_g = 'St'",
  "class_g = 'st-256color'"
];

# --- CORNERS ---
corner-radius = 7;
rounded-corners-exclude = [
  "window_type = 'desktop'",
  "class_g = 'wired'",
  "class_g = 'st-256color'",
  "class_g = 'dmenu'"
];

# --- COZY FROSTED BLUR ---
blur: {
  method = "dual_kawase";
  strength = 8;
  background = true;
  background-frame = true;
  background-fixed = true;
}
blur-background-exclude = [
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c",
  "class_g = 'firefox' && argb",
  "class_g = 'Discord'",
  "class_g = 'Dunst'",
  "class_g = 'Peek'",
  "class_g = 'dwm'",
  "class_g *?= 'slop'"
];

# --- GENERAL SETTINGS ---
backend = "egl";
dithered-present = false;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
use-ewmh-active-win = true;
unredir-if-possible = false;
detect-transient = true;
glx-no-stencil = true;
use-damage = true;
xrender-sync-fence = true;
window-shader-fg = "default";
transparent-clipping = false;
log-level = "warn";

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; blur-background = true; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.8; }
  dropdown_menu = { opacity = 0.8; }
};

# --- OPACITY RULES ---
opacity-rule = [
  "100:class_g = 'St'",
  "100:class_g = 'st-256color'",
  "100:class_g = 'dwm'",
  "100:class_g = 'Polybar'",
  "100:class_g = 'Rofi'",
  "40:class_g = 'XTerm'",
  "70:class_g = 'Spotify'",
  "60:class_g = 'com.github.th_ch.youtube_music'",
  "50:class_g = 'Alacritty'",
  "30:class_g = 'Thunar'",
  "50:class_g = 'dunst'",
  "100:class_g = 'firefox' && focused",
  "100:class_g = 'firefox' && !focused",
  "100:fullscreen"
];
